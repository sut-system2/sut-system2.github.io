  - title: Content
    id: details
    type: section
    subsections:
      - title: Prerequisites
        text: |
          Essential: Deep Learning
          Recommended: Planning and Neurosymbolic AI
          
      - title: Classes
        text: >
          Classes are held on Sundays and Tuesdays from 15:00 to 16:30 (UTC+3:30) in Room 201, Department of Computer Engineering, Sharif University of Technology.
          
      - title: Grading
        text: |
          Please note that grades will be calculated out of 21.0, 
          with the respective grades for each section provided below:

            - **Final Exam**: 6 points.
            - **Scheduled Quizzes**: 3 points.
            - **UnScheduled Quizzes (Optional)**: 1 points.
            - **Presentation**: 1 points.
            - **Howeworks**: 4 points.
            - **Project**: 5 points.
            - **Poster Session**: 1 points.
      
      - title: Exam
        text: >
          There is no midterm exam. The final exam will be held on **June 28, 2026, at 8:00 AM (UTC+3:30).**
      
      - title: Quiz
        text: >
          There will be three scheduled quizzes (and one optional unscheduled quiz).

            - **Quiz 1**: Sessions 1 to 10 - March 10, 2026 (Tue, Esfand 19).
            - **Quiz 2**: Sessions 11 to 18 - May 10, 2026 (Sun, Ordibehesht 21).
            - **Quiz 3**: Sessions 19 to 24 - May 31, 2026 (Tue, Khordad 10).
        
      - title: Homeworks
        text: >
          There will be four homework assignments in this course, all to be submitted via the [**Quera Website**](https://quera.org/course/20771). You have an additional **two days** after the deadline for late submissions. Throughout the semester, you are allowed a total of **five days of delayed submissions** without penalty. Beyond this limit, a **1% deduction** will be applied to the assignment grade for every **hour** of further delay. Due to the tight schedule, no deadline extensions will be granted during the semester.

            - **HW 1**: Sessions 1 to 10 - Released March 13, 2026; deadline April 9, 2026.
            - **HW 2**: Sessions 11 to 18 - Released April 10, 2026; deadline April 30, 2026.
            - **HW 3**: Sessions 19 to 24 - Released May 1, 2026; deadline May 14, 2026.
            - **HW 4**: Sessions 25 to 28 - Released May 15, 2026; deadline May 28, 2026.

      - title: Project
        text: >
          Key project milestones (from the course Events): Project Topic Selection deadline May 19, 2026; Proposal Presentation June 3, 2026; Project Progress Presentation to TAs (Part 1) June 11, 2026, (Part 2) July 26, 2026; Project deadline August 1, 2026. Further details will be announced on the Telegram channel.
          
      - title: Collaboration, Academic Honesty, and Plagiarism
        text: >
          Cheating or copying homework assignments will not be tolerated. On the first offense, you will be referred to the committee and will **fail the course**. Please review [**the Education Committee's guidelines on homework integrity**](https://docs.ce.sharif.edu/rules/ethics).

